services:
  broker:
    image: confluentinc/cp-kafka:7.8.0
    hostname: broker
    container_name: broker
    ports:
      - "29092:29092"
    environment:
      KAFKA_CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://broker:9092,CONTROLLER://broker:9093,PLAINTEXT_HOST://0.0.0.0:29092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAME: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  jupyter:
    build: .
    container_name: jupyter
    depends_on:
      - broker
      - redis
    environment:
      - JUPYTER_TOKEN=
      - KAFKA_BOOTSTRAP_SERVERS=broker:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: start-notebook.py --NotebookApp.token='' --NotebookApp.password=''
    volumes:
      - ./:/home/jovyan/work
    ports:
      - "8999:8888"
      - "4040:4040"

  dashboard:
    build: .
    container_name: dashboard
    depends_on:
      - broker
      - redis
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=broker:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: streamlit run /home/jovyan/work/dashboard/app.py --server.address=0.0.0.0 --server.port=8501
    volumes:
      - ./:/home/jovyan/work
    ports:
      - "8501:8501"

  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    depends_on:
      - redis
    ports:
      - "5540:5540"